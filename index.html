<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RuneLite Layout Converter</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Rajdhani:wght@400;600;700&display=swap');

  :root {
    --bg:        #0d0f14;
    --surface:   #13161e;
    --raised:    #1a1e29;
    --border:    #252a38;
    --accent:    #c8a94a;
    --accent2:   #4a8bc8;
    --success:   #4ac87a;
    --danger:    #c84a4a;
    --text:      #d4c9a8;
    --muted:     #6b7280;
    --mono:      'Share Tech Mono', monospace;
    --sans:      'Rajdhani', sans-serif;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--sans);
    font-size: 16px;
    min-height: 100vh;
    padding: 0 0 60px 0;
  }

  /* ── Header ── */
  header {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 20px 32px;
    display: flex;
    align-items: center;
    gap: 16px;
  }
  .logo {
    width: 36px; height: 36px;
    background: #5bb8d4;
    clip-path: polygon(50% 0%, 100% 25%, 100% 75%, 50% 100%, 0% 75%, 0% 25%);
    display: flex; align-items: center; justify-content: center;
    font-size: 18px; flex-shrink: 0;
  }
  header h1 {
    font-family: var(--sans);
    font-size: 22px;
    font-weight: 700;
    letter-spacing: 0.08em;
    color: var(--accent);
    text-transform: uppercase;
  }
  header p {
    font-size: 13px;
    color: var(--muted);
    margin-top: 2px;
    letter-spacing: 0.04em;
  }

  /* ── Page Nav ── */
  .page-nav {
    display: flex;
    gap: 0;
    margin: 0;
    border-bottom: 1px solid var(--border);
    background: var(--surface);
    padding: 0 32px;
  }
  .page-btn {
    background: none;
    border: none;
    border-bottom: 2px solid transparent;
    color: var(--muted);
    font-family: var(--sans);
    font-size: 14px;
    font-weight: 600;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    padding: 14px 20px 12px;
    cursor: pointer;
    transition: color 0.15s, border-color 0.15s;
    margin-bottom: -1px;
  }
  .page-btn.active { color: var(--accent); border-bottom-color: var(--accent); }
  .page-btn:hover:not(.active) { color: var(--text); }

  /* ── Mode selector ── */
  .mode-bar {
    display: flex;
    gap: 0;
    margin: 28px 32px 0;
    border: 1px solid var(--border);
    border-radius: 4px;
    overflow: hidden;
    max-width: 640px;
  }
  .mode-btn {
    flex: 1;
    background: var(--surface);
    border: none;
    color: var(--muted);
    font-family: var(--sans);
    font-size: 14px;
    font-weight: 600;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    padding: 12px;
    cursor: pointer;
    transition: background 0.15s, color 0.15s;
    border-right: 1px solid var(--border);
  }
  .mode-btn:last-child { border-right: none; }
  .mode-btn.active { background: var(--raised); color: var(--accent); }
  .mode-btn:hover:not(.active) { color: var(--text); }

  /* ── Main layout ── */
  .panels {
    display: grid;
    grid-template-columns: 1fr 56px 1fr;
    gap: 0;
    margin: 24px 32px 0;
    align-items: start;
  }

  /* ── Panel ── */
  .panel {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 4px;
    overflow: hidden;
  }
  .panel-header {
    background: var(--raised);
    border-bottom: 1px solid var(--border);
    padding: 12px 16px;
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .panel-badge {
    font-family: var(--mono);
    font-size: 10px;
    padding: 3px 8px;
    border-radius: 2px;
    letter-spacing: 0.08em;
    text-transform: uppercase;
  }
  .badge-is  { background: #2a1f08; color: var(--accent);  border: 1px solid #4a360f; }
  .badge-btl { background: #0d1f2a; color: var(--accent2); border: 1px solid #0f3050; }
  .panel-title {
    font-size: 13px;
    font-weight: 700;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    color: var(--text);
  }

  textarea {
    width: 100%;
    height: 280px;
    background: var(--bg);
    border: none;
    color: var(--text);
    font-family: var(--mono);
    font-size: 11px;
    line-height: 1.6;
    padding: 14px;
    resize: vertical;
    outline: none;
    display: block;
  }
  textarea::placeholder { color: var(--muted); opacity: 0.6; }
  textarea:focus { background: #0f1118; }

  .panel-footer {
    border-top: 1px solid var(--border);
    padding: 10px 14px;
    display: flex;
    gap: 8px;
    align-items: center;
    flex-wrap: wrap;
  }

  .btn {
    font-family: var(--sans);
    font-size: 13px;
    font-weight: 700;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    padding: 8px 16px;
    border-radius: 3px;
    border: none;
    cursor: pointer;
    transition: opacity 0.15s, transform 0.1s;
  }
  .btn:active { transform: scale(0.97); }
  .btn:disabled { opacity: 0.35; cursor: not-allowed; }
  .btn-primary   { background: var(--accent); color: #111; }
  .btn-secondary { background: var(--raised); color: var(--text); border: 1px solid var(--border); }
  .btn-copy { background: var(--raised); color: var(--accent2); border: 1px solid #1a3a55; }
  .btn-copy.copied { color: var(--success); border-color: #1a3d2a; }

  /* ── Arrow / convert button ── */
  .arrow-col {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding-top: 60px;
    gap: 10px;
  }
  .convert-btn {
    width: 44px; height: 44px;
    background: var(--raised);
    border: 1px solid var(--border);
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    cursor: pointer;
    transition: border-color 0.15s, background 0.15s;
    color: var(--accent);
    font-size: 18px;
  }
  .convert-btn:hover { border-color: var(--accent); background: #1e2130; }

  /* ── Status / info area ── */
  .status-bar { margin: 16px 32px 0; min-height: 48px; }
  .status-msg {
    display: none;
    padding: 12px 16px;
    border-radius: 3px;
    font-family: var(--mono);
    font-size: 12px;
    line-height: 1.6;
    border-left: 3px solid;
  }
  .status-msg.show { display: block; }
  .status-msg.success { background: #0d1f14; border-color: var(--success); color: var(--success); }
  .status-msg.error   { background: #1f0d0d; border-color: var(--danger);  color: var(--danger);  }
  .status-msg.info    { background: #0d1525; border-color: var(--accent2); color: var(--accent2); }

  /* ── Details panel ── */
  .details {
    margin: 16px 32px 0;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 4px;
    overflow: hidden;
    display: none;
  }
  .details.show { display: block; }
  .details-header {
    background: var(--raised);
    border-bottom: 1px solid var(--border);
    padding: 10px 16px;
    font-size: 12px;
    font-weight: 700;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--muted);
  }
  .details-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
    gap: 0;
  }
  .detail-item { padding: 12px 16px; border-right: 1px solid var(--border); border-bottom: 1px solid var(--border); }
  .detail-label { font-size: 11px; color: var(--muted); letter-spacing: 0.06em; text-transform: uppercase; margin-bottom: 4px; }
  .detail-value { font-family: var(--mono); font-size: 13px; color: var(--text); }
  .detail-value.accent  { color: var(--accent); }
  .detail-value.accent2 { color: var(--accent2); }
  .detail-value.success { color: var(--success); }

  /* ── Format hint ── */
  .format-hint {
    margin: 16px 32px 0;
    padding: 12px 16px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 3px;
    font-size: 12px;
    color: var(--muted);
    line-height: 1.7;
    font-family: var(--mono);
  }
  .format-hint strong { color: var(--text); }

  /* ── Recommended Setups Page ── */
  #page-setups { padding: 28px 32px 0; }

  .cat-bar {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
    margin-bottom: 24px;
  }
  .cat-btn {
    font-family: var(--sans);
    font-size: 13px;
    font-weight: 700;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    padding: 7px 16px;
    border-radius: 3px;
    border: 1px solid var(--border);
    background: var(--surface);
    color: var(--muted);
    cursor: pointer;
    transition: background 0.15s, color 0.15s, border-color 0.15s;
  }
  .cat-btn:hover:not(.active) { color: var(--text); border-color: #3a4055; }
  .cat-btn.active { background: var(--raised); color: var(--accent); border-color: var(--accent); }

  .setups-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
    gap: 16px;
  }

  .setup-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 4px;
    overflow: hidden;
    transition: border-color 0.15s;
  }
  .setup-card:hover { border-color: #3a4055; }

  .setup-card-header {
    padding: 14px 16px 12px;
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    gap: 12px;
  }
  .setup-card-info { flex: 1; min-width: 0; }
  .setup-card-name {
    font-size: 15px;
    font-weight: 700;
    letter-spacing: 0.04em;
    color: var(--text);
    margin-bottom: 4px;
  }
  .setup-card-desc {
    font-size: 12px;
    color: var(--muted);
    line-height: 1.5;
  }

  .cat-tag {
    font-family: var(--mono);
    font-size: 10px;
    padding: 3px 8px;
    border-radius: 2px;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    flex-shrink: 0;
    white-space: nowrap;
  }
  .cat-General { background: #1a2010; color: #7ac84a; border: 1px solid #2d4020; }
  .cat-Bossing { background: #1f0d0d; color: #c84a4a; border: 1px solid #3f1515; }
  .cat-Skilling { background: #0d1f25; color: #4ac8c8; border: 1px solid #103535; }
  .cat-Slayer  { background: #1a1020; color: #a84ac8; border: 1px solid #301540; }
  .cat-Raiding { background: #0d1525; color: #4a8bc8; border: 1px solid #0f3050; }
  .cat-PvP     { background: #1f1500; color: #c8a94a; border: 1px solid #3f2a00; }

  .setup-card-footer {
    border-top: 1px solid var(--border);
    padding: 10px 14px;
  }
  .btn-get-setup {
    font-family: var(--sans);
    font-size: 13px;
    font-weight: 700;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    padding: 7px 14px;
    border-radius: 3px;
    border: 1px solid var(--border);
    background: var(--raised);
    color: var(--accent2);
    cursor: pointer;
    transition: background 0.15s, border-color 0.15s;
    width: 100%;
  }
  .btn-get-setup:hover { background: #1e2535; border-color: #2a4060; }
  .btn-get-setup.open { color: var(--muted); }

  .setup-expand {
    display: none;
    border-top: 1px solid var(--border);
    padding: 12px 14px;
    background: var(--bg);
  }
  .setup-expand.show { display: block; }
  .setup-expand textarea {
    height: 90px;
    font-size: 10px;
    padding: 10px;
    border: 1px solid var(--border);
    border-radius: 3px;
    resize: none;
    background: var(--surface);
  }
  .setup-expand textarea:focus { background: var(--raised); }
  .setup-expand-footer {
    display: flex;
    gap: 8px;
    margin-top: 8px;
    align-items: center;
  }
  .setup-expand-footer .btn-copy { font-size: 12px; padding: 6px 14px; }
  .setup-type-label {
    font-family: var(--mono);
    font-size: 10px;
    color: var(--muted);
    letter-spacing: 0.06em;
  }

  .no-setups {
    grid-column: 1 / -1;
    text-align: center;
    padding: 48px;
    color: var(--muted);
    font-size: 14px;
    letter-spacing: 0.04em;
  }

  /* ── Responsive ── */
  @media (max-width: 800px) {
    .panels { grid-template-columns: 1fr; }
    .arrow-col { flex-direction: row; padding-top: 0; padding: 12px 0; }
    header, .mode-bar, .status-bar, .details, .format-hint { margin-left: 16px; margin-right: 16px; }
    .panels { margin-left: 16px; margin-right: 16px; }
    .page-nav { padding: 0 16px; }
    #page-setups { padding: 20px 16px 0; }
  }
</style>
</head>
<body>

<header>
  <div class="logo">🐸</div>
  <div>
    <h1>Layout Converter</h1>
    <p>Inventory Setups &nbsp;↔&nbsp; Bank Tag Layouts</p>
  </div>
</header>

<nav class="page-nav">
  <button class="page-btn active" id="nav-converter" onclick="showPage('converter')">Converter</button>
  <button class="page-btn" id="nav-setups" onclick="showPage('setups')">Recommended Setups</button>
</nav>

<!-- ════════════════════ CONVERTER PAGE ════════════════════ -->
<div id="page-converter">

  <div class="mode-bar">
    <button class="mode-btn active" id="btn-btl-to-is" onclick="setMode('btl-to-is')">Bank Tag Layouts → Inventory Setups</button>
    <button class="mode-btn" id="btn-is-to-btl" onclick="setMode('is-to-btl')">Inventory Setups → Bank Tag Layouts</button>
  </div>

  <div class="format-hint" id="format-hint"></div>

  <div class="panels">
    <div class="panel" id="panel-input">
      <div class="panel-header">
        <span class="panel-badge" id="badge-input">Inventory Setups</span>
        <span class="panel-title" id="label-input">Inventory Setups Export (JSON)</span>
      </div>
      <textarea id="input-text" spellcheck="false" placeholder="Paste your exported data here..."></textarea>
      <div class="panel-footer">
        <button class="btn btn-secondary" onclick="document.getElementById('input-text').value=''; clearOutput()">Clear</button>
        <button class="btn btn-secondary" onclick="pasteFromClipboard()">Paste</button>
        <button class="btn btn-primary" onclick="convert()">Convert</button>
      </div>
    </div>

    <div class="arrow-col">
      <button class="convert-btn" onclick="convert()" title="Convert">⇄</button>
    </div>

    <div class="panel" id="panel-output">
      <div class="panel-header">
        <span class="panel-badge" id="badge-output">Bank Tag Layouts</span>
        <span class="panel-title" id="label-output">Bank Tag Layouts Import String</span>
      </div>
      <textarea id="output-text" spellcheck="false" readonly placeholder="Output will appear here..."></textarea>
      <div class="panel-footer">
        <button class="btn btn-copy" id="copy-btn" onclick="copyOutput()">Copy Output</button>
      </div>
    </div>
  </div>

  <div class="status-bar">
    <div class="status-msg" id="status-msg"></div>
  </div>

  <div class="details" id="details-panel">
    <div class="details-header">Parsed Details</div>
    <div class="details-grid" id="details-grid"></div>
  </div>

</div>

<!-- ════════════════════ RECOMMENDED SETUPS PAGE ════════════════════ -->
<div id="page-setups" style="display:none">

  <div class="cat-bar" id="cat-bar"></div>
  <div class="setups-grid" id="setups-grid"></div>

</div>

<script>
// ─────────────────────────────────────────────────────────────
//  Recommended Setups Data
//  Add new setups by adding entries to this array.
//  Fields:
//    name        - Display name
//    category    - General | Bossing | Skilling | Slayer | Raiding | PvP
//    description - Short description shown on the card
//    type        - "is" (Inventory Setups JSON) | "btl" (Bank Tag Layouts string)
//    data        - The actual export string to copy
// ─────────────────────────────────────────────────────────────
const SETUPS = [
  // ── General ──────────────────────────────────────────────

    type: "is",

  },
  {

    type: "is",

  },
  {

  },
  {

    data: ""
  },
  {
    name: "Barrows",
    category: "Bossing",
    description: "Barrows run setup with prayer potions and spade.",
    type: "is",
    data: ""
  },

  // ── Skilling ─────────────────────────────────────────────
  {
    name: "Farming Run",
    category: "Skilling",
    description: "Complete farming run — allotments, herbs, trees, and fruit trees.",
    type: "is",
    data: ""
  },
  {

  {

  {

    description: "AFK swordfish/tuna fishing with infernal harpoon.",
    type: "is",
    data: ""
  },

  // ── Slayer ────────────────────────────────────────────────
  {
    name: "Slayer — General",
    category: "Slayer",
    description: "General slayer setup with melee gear and switches for common tasks.",
    type: "is",
    data: ""
  },
  {
    name: "Cerberus",
    category: "Slayer",
    description: "Cerberus slayer setup with prayer potions and BIS melee.",
    type: "is",
    data: ""
  },
  {
    name: "Alchemical Hydra",
    category: "Slayer",
    description: "Hydra slayer setup — ranged or mage depending on style.",
    type: "is",
    data: ""
  },
  {
    name: "Abyssal Sire",
    category: "Slayer",
    description: "Sire setup with ranged switches and restore potions.",
    type: "is",
    data: ""
  },

  // ── Raiding ───────────────────────────────────────────────
  {
    name: "Chambers of Xeric",
    category: "Raiding",
    description: "CoX raiding layout with all switches for solo or team.",
    type: "is",
    data: ""
  },
  {
    name: "Theatre of Blood",
    category: "Raiding",
    description: "ToB layout with room-by-room gear switches.",
    type: "is",
    data: ""
  },
  {
    name: "Tombs of Amascut",
    category: "Raiding",
    description: "ToA setup with invocation flexibility and prayer switches.",
    type: "is",
    data: ""
  },

  // ── PvP ───────────────────────────────────────────────────
  {
    name: "Tribrid NH",
    category: "PvP",
    description: "No honour tribrid setup for singles and multi combat.",
    type: "is",
    data: ""
  },
  {
    name: "Bridding",
    category: "PvP",
    description: "Classic bridding setup for 1v1 fights.",
    type: "is",
    data: ""
  },
  {
    name: "PvP — Rushing",
    category: "PvP",
    description: "Rushing setup with spec weapons and quick switch items.",
    type: "is",
    data: ""
  },
];

const CATEGORIES = ["General", "Bossing", "Skilling", "Slayer", "Raiding", "PvP"];

let activeCategory = "All";

function buildCategoryBar() {
  const bar = document.getElementById("cat-bar");
  const all = ["All", ...CATEGORIES];
  bar.innerHTML = all.map(cat =>
    `<button class="cat-btn${cat === activeCategory ? " active" : ""}" onclick="filterCategory('${cat}')">${cat}</button>`
  ).join("");
}

function filterCategory(cat) {
  activeCategory = cat;
  buildCategoryBar();
  renderSetups();
}

function renderSetups() {
  const grid = document.getElementById("setups-grid");
  const filtered = activeCategory === "All"
    ? SETUPS
    : SETUPS.filter(s => s.category === activeCategory);

  if (filtered.length === 0) {
    grid.innerHTML = `<div class="no-setups">No setups in this category yet.</div>`;
    return;
  }

  grid.innerHTML = filtered.map((s, idx) => {
    const id = "setup-" + SETUPS.indexOf(s);
    const typeLabel = s.type === "btl"
      ? "Bank Tag Layouts string"
      : "Inventory Setups JSON";
    const placeholder = s.data
      ? s.data
      : "(No setup data added yet)";
    return `
      <div class="setup-card" id="card-${id}">
        <div class="setup-card-header">
          <div class="setup-card-info">
            <div class="setup-card-name">${s.name}</div>
            <div class="setup-card-desc">${s.description}</div>
          </div>
          <span class="cat-tag cat-${s.category}">${s.category}</span>
        </div>
        <div class="setup-card-footer">
          <button class="btn-get-setup" id="btn-${id}" onclick="toggleSetup('${id}')">Get Setup String</button>
        </div>
        <div class="setup-expand" id="expand-${id}">
          <textarea id="ta-${id}" readonly spellcheck="false">${placeholder}</textarea>
          <div class="setup-expand-footer">
            <button class="btn btn-copy" id="copy-${id}" onclick="copySetup('${id}')">Copy</button>
            <span class="setup-type-label">${typeLabel}</span>
          </div>
        </div>
      </div>`;
  }).join("");
}

function toggleSetup(id) {
  const expand = document.getElementById("expand-" + id);
  const btn    = document.getElementById("btn-" + id);
  const isOpen = expand.classList.contains("show");

  if (isOpen) {
    expand.classList.remove("show");
    btn.textContent = "Get Setup String";
    btn.classList.remove("open");
  } else {
    expand.classList.add("show");
    btn.textContent = "Hide";
    btn.classList.add("open");
    const ta = document.getElementById("ta-" + id);
    ta.select();
  }
}

function copySetup(id) {
  const ta  = document.getElementById("ta-" + id);
  const btn = document.getElementById("copy-" + id);
  if (!ta.value || ta.value.startsWith("(No setup data")) return;

  const markCopied = () => {
    btn.textContent = "Copied!";
    btn.classList.add("copied");
    setTimeout(() => { btn.textContent = "Copy"; btn.classList.remove("copied"); }, 2000);
  };

  if (navigator.clipboard && navigator.clipboard.writeText) {
    navigator.clipboard.writeText(ta.value).then(markCopied).catch(() => fallbackCopyEl(ta, markCopied));
  } else {
    fallbackCopyEl(ta, markCopied);
  }
}

function fallbackCopyEl(ta, onSuccess) {
  ta.removeAttribute("readonly");
  ta.select();
  ta.setSelectionRange(0, ta.value.length);
  try {
    if (document.execCommand("copy")) onSuccess();
  } catch(e) {}
  ta.setAttribute("readonly", "");
  window.getSelection()?.removeAllRanges();
}

// ─────────────────────────────────────────────────────────────
//  Page navigation
// ─────────────────────────────────────────────────────────────
function showPage(page) {
  document.getElementById("page-converter").style.display = page === "converter" ? "" : "none";
  document.getElementById("page-setups").style.display    = page === "setups"    ? "" : "none";
  document.getElementById("nav-converter").classList.toggle("active", page === "converter");

// ─────────────────────────────────────────────────────────────
//  Constants (mirrored from source)
// ─────────────────────────────────────────────────────────────
const BTL_PREFIX       = 'banktaglayoutsplugin:';
const SPADE_ITEM_ID    = 952;
const WEAPON_SLOT_IDX  = 3;

// ─────────────────────────────────────────────────────────────
//  Mode state
// ─────────────────────────────────────────────────────────────
let currentMode = 'is-to-btl';

function setMode(mode) {
  currentMode = mode;
  document.getElementById('btn-is-to-btl').classList.toggle('active', mode === 'is-to-btl');
  document.getElementById('btn-btl-to-is').classList.toggle('active', mode === 'btl-to-is');

  if (mode === 'is-to-btl') {
    document.getElementById('badge-input').textContent  = 'Inventory Setups';
    document.getElementById('badge-input').className    = 'panel-badge badge-is';
    document.getElementById('label-input').textContent  = 'Inventory Setups Export (JSON)';
    document.getElementById('badge-output').textContent = 'Bank Tag Layouts';
    document.getElementById('badge-output').className   = 'panel-badge badge-btl';
    document.getElementById('label-output').textContent = 'Bank Tag Layouts Import String';
    document.getElementById('format-hint').innerHTML =
      '<strong>Input:</strong> Paste the JSON copied from Inventory Setups "Export" button.<br>' +
      '<strong>Output:</strong> A <code>banktaglayoutsplugin:...</code> string, importable via Bank Tag Layouts "Import tag tab with layout".';
  } else {
    document.getElementById('badge-input').textContent  = 'Bank Tag Layouts';
    document.getElementById('badge-input').className    = 'panel-badge badge-btl';
    document.getElementById('label-input').textContent  = 'Bank Tag Layouts Export String';
    document.getElementById('badge-output').textContent = 'Inventory Setups';
    document.getElementById('badge-output').className   = 'panel-badge badge-is';
    document.getElementById('label-output').textContent = 'Inventory Setups Import String (JSON)';
    document.getElementById('format-hint').innerHTML =
      '<strong>Input:</strong> Paste the <code>banktaglayoutsplugin:...</code> string from Bank Tag Layouts "Export tag tab with layout".<br>' +
      '<strong>Output:</strong> A JSON string, importable via Inventory Setups "Import setup...".';
  }

  clearOutput();
}

function clearOutput() {
  document.getElementById('output-text').value = '';
  document.getElementById('status-msg').className = 'status-msg';
  document.getElementById('details-panel').classList.remove('show');
}

// ─────────────────────────────────────────────────────────────
//  Clipboard helpers
// ─────────────────────────────────────────────────────────────
async function pasteFromClipboard() {
  if (navigator.clipboard && navigator.clipboard.readText) {
    try {
      const text = await navigator.clipboard.readText();
      document.getElementById('input-text').value = text;
      return;
    } catch (e) {}
  }
  const ta = document.getElementById('input-text');
  ta.focus();
  showStatus('Clipboard read is blocked on local files — press Ctrl+V to paste.', 'info');
}

function copyOutput() {
  const val = document.getElementById('output-text').value;
  if (!val) return;

  const btn = document.getElementById('copy-btn');
  const markCopied = () => {
    btn.textContent = 'Copied!';
    btn.classList.add('copied');
    setTimeout(() => { btn.textContent = 'Copy Output'; btn.classList.remove('copied'); }, 2000);
  };

  if (navigator.clipboard && navigator.clipboard.writeText) {
    navigator.clipboard.writeText(val).then(markCopied).catch(() => fallbackCopy(val, markCopied));
  } else {
    fallbackCopy(val, markCopied);
  }
}

function fallbackCopy(text, onSuccess) {
  const ta = document.getElementById('output-text');
  ta.removeAttribute('readonly');
  ta.select();
  ta.setSelectionRange(0, ta.value.length);
  try {
    const ok = document.execCommand('copy');
    if (ok) { onSuccess(); }
    else { showStatus('Copy failed — select the output text and press Ctrl+C.', 'error'); }
  } catch (e) {
    showStatus('Copy failed — select the output text and press Ctrl+C.', 'error');
  }
  ta.setAttribute('readonly', '');
  window.getSelection()?.removeAllRanges();
}

// ─────────────────────────────────────────────────────────────
//  Status / details helpers
// ─────────────────────────────────────────────────────────────
function showStatus(msg, type = 'info') {
  const el = document.getElementById('status-msg');
  el.textContent = msg;
  el.className = `status-msg show ${type}`;
}

function showDetails(fields) {
  const grid = document.getElementById('details-grid');
  grid.innerHTML = fields.map(f =>
    `<div class="detail-item">
       <div class="detail-label">${f.label}</div>
       <div class="detail-value ${f.cls || ''}">${f.value}</div>
     </div>`
  ).join('');
  document.getElementById('details-panel').classList.add('show');
}

// ─────────────────────────────────────────────────────────────
//  IS → BTL conversion
// ─────────────────────────────────────────────────────────────
function convertISToBTL(jsonStr) {
  let portable;
  try {
    portable = JSON.parse(jsonStr.trim());
  } catch(e) {
    throw new Error('Invalid JSON — could not parse Inventory Setup export data.');
  }

  if (!portable.setup) throw new Error('Missing "setup" field — is this an Inventory Setup export?');
  if (!portable.layout) throw new Error('Missing "layout" array — setup has no layout data.');

  const setup  = portable.setup;
  const layout = portable.layout;
  const setupName = setup.name;
  if (!setupName) throw new Error('Setup is missing a name.');

  const btlLayoutParts = [];
  for (let i = 0; i < layout.length; i++) {
    if (layout[i] !== -1) btlLayoutParts.push(`${layout[i]}:${i}`);
  }
  const btlLayoutString = btlLayoutParts.join(',');

  const tagItemIds = new Set();
  const collectItems = (list) => {
    if (!list) return;
    for (const item of list) { if (item && item.id > 0) tagItemIds.add(item.id); }
  };
  collectItems(setup.inv);
  collectItems(setup.eq);
  collectItems(setup.rp);
  collectItems(setup.bp);
  collectItems(setup.qv);
  if (setup.afi) {
    for (const key of Object.keys(setup.afi)) {
      const item = setup.afi[key];
      if (item && item.id > 0) tagItemIds.add(item.id);
    }
  }

  let iconId = setup.iId && setup.iId > 0 ? setup.iId : -1;
  if (iconId <= 0 && setup.eq && setup.eq[WEAPON_SLOT_IDX]) iconId = setup.eq[WEAPON_SLOT_IDX].id || -1;
  if (iconId <= 0) iconId = SPADE_ITEM_ID;

  const tagName = setupName.trim().toLowerCase();
  let exportStr = BTL_PREFIX + tagName;
  if (btlLayoutString.length > 0) exportStr += ',' + btlLayoutString;

  const tagItems = Array.from(tagItemIds);
  const bankTagParts = [tagName, String(iconId), ...tagItems.map(String)];
  exportStr += ',banktag:' + bankTagParts.join(',');

  const details = [
    { label: 'Setup Name',    value: setupName,                  cls: 'accent'  },
    { label: 'Tag Name',      value: tagName,                    cls: 'accent2' },
    { label: 'Layout Slots',  value: btlLayoutParts.length + ' items positioned', cls: 'success' },
    { label: 'Tag Items',     value: tagItems.length + ' unique items'           },
    { label: 'Icon Item ID',  value: String(iconId)                              },
    { label: 'Has Rune Pouch',value: setup.rp ? 'Yes' : 'No'                    },
    { label: 'Has Bolt Pouch',value: setup.bp ? 'Yes' : 'No'                    },
    { label: 'Has Quiver',    value: setup.qv ? 'Yes' : 'No'                    },
    { label: 'Addl. Items',   value: setup.afi ? Object.keys(setup.afi).length + ' items' : '0' },
  ];

  return { output: exportStr, details };
}

// ─────────────────────────────────────────────────────────────
//  BTL → IS conversion
// ─────────────────────────────────────────────────────────────
function convertBTLToIS(btlStr) {
  const trimmed = btlStr.trim();

  if (!trimmed.startsWith(BTL_PREFIX)) {
    throw new Error(`Invalid BTL format — string must start with "${BTL_PREFIX}"`);
  }

  const banktag_sep_idx = trimmed.indexOf(',banktag:');
  if (banktag_sep_idx === -1) {
    throw new Error('Invalid BTL format — missing ",banktag:" separator. Did you copy the full string?');
  }

  const layoutSection  = trimmed.substring(BTL_PREFIX.length, banktag_sep_idx);
  const banktagSection = trimmed.substring(banktag_sep_idx + ',banktag:'.length);

  const firstComma = layoutSection.indexOf(',');
  let tagName, layoutString;
  if (firstComma === -1) {
    tagName      = layoutSection;
    layoutString = '';
  } else {
    tagName      = layoutSection.substring(0, firstComma);
    layoutString = layoutSection.substring(firstComma + 1);
  }

  if (!tagName) throw new Error('Could not extract tag name from BTL string.');

  const btlMap = {};
  let maxIndex = -1;
  if (layoutString.length > 0) {
    for (const pair of layoutString.split(',')) {
      const parts = pair.split(':');
      if (parts.length !== 2) throw new Error(`Invalid layout pair: "${pair}"`);
      const itemId = parseInt(parts[0], 10);
      const index  = parseInt(parts[1], 10);
      if (isNaN(itemId) || isNaN(index)) throw new Error(`Non-numeric value in layout pair: "${pair}"`);
      btlMap[index] = itemId;
      if (index > maxIndex) maxIndex = index;
    }
  }

  const isLayout = new Array(maxIndex + 1).fill(-1);
  for (const [idx, itemId] of Object.entries(btlMap)) isLayout[parseInt(idx, 10)] = itemId;

  const bankTagParts = banktagSection.split(',');
  if (bankTagParts.length < 2) throw new Error('Invalid banktag section — too few fields.');

  const iconId     = parseInt(bankTagParts[1], 10);
  const tagItemIds = bankTagParts.slice(2).map(s => parseInt(s, 10)).filter(n => !isNaN(n) && n > 0);

  const DUMMY    = null;
  const invSlots = new Array(28).fill(DUMMY);
  const eqSlots  = new Array(14).fill(DUMMY);
  let invIdx = 0;
  for (const itemId of tagItemIds) {
    if (invIdx >= 28) break;
    invSlots[invIdx++] = { id: itemId };
  }

  const isPortable = {
    setup: {
      inv:  invSlots, eq: eqSlots, rp: null, bp: null, qv: null, afi: {},
      name: tagName, notes: null,
      hc: "#FF48A4D8", hd: true, dc: null, fb: true, uh: true, sb: null, fv: null,
      iId: iconId > 0 && iconId !== SPADE_ITEM_ID ? iconId : null,
    },
    layout: isLayout,
  };

  const details = [
    { label: 'Tag Name',      value: tagName,                     cls: 'accent2' },
    { label: 'Layout Slots',  value: Object.keys(btlMap).length + ' items positioned', cls: 'success' },
    { label: 'Tag Items',     value: tagItemIds.length + ' items in tag'               },
    { label: 'IS Layout Size',value: isLayout.length + ' slots (dense array)'          },
    { label: 'Icon Item ID',  value: String(iconId)                                    },
    { label: 'Note',          value: 'Slot assignments reconstructed from layout positions', cls: 'accent' },
  ];

  return { output: JSON.stringify(isPortable), details };
}

// ─────────────────────────────────────────────────────────────
//  Main convert dispatcher
// ─────────────────────────────────────────────────────────────
function convert() {
  const input = document.getElementById('input-text').value.trim();
  if (!input) { showStatus('No input — paste your export data first.', 'error'); return; }

  try {
    let result;
    if (currentMode === 'is-to-btl') {
      result = convertISToBTL(input);
    } else {
      result = convertBTLToIS(input);
    }
    document.getElementById('output-text').value = result.output;
    showStatus('Conversion successful.', 'success');
    showDetails(result.details);
  } catch(e) {
    showStatus('Error: ' + e.message, 'error');
    document.getElementById('details-panel').classList.remove('show');
  }
}

setMode('btl-to-is');
buildCategoryBar();
